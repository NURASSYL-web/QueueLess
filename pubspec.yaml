name: queue
description: "QueueLess is a real-time queue tracking app for places across Taraz."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.0.3
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.1
  firebase_core: ^4.1.0
  firebase_messaging: ^16.0.3
  firebase_storage: ^13.0.2
  flutter_local_notifications: ^19.4.0
  geolocator: ^14.0.2
  google_fonts: ^6.3.1
  google_maps_flutter: ^2.14.0
  image_picker: ^1.2.0
  intl: ^0.20.2
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/queueless_logo.png
    - assets/seed/
